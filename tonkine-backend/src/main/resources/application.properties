# ═══════════════════════════════════════════════════════════
# TonKiné au Travail — Configuration principale
# ═══════════════════════════════════════════════════════════
# Choisissez le profil actif selon votre base de données :
#   postgres  → PostgreSQL (recommandé en production)
#   mysql     → MySQL / MariaDB
#   h2        → H2 embarqué (développement local, sans installation)
#
# Changez uniquement cette ligne pour switcher de base :
spring.profiles.active=postgres
# ═══════════════════════════════════════════════════════════

# ── Application ──
spring.application.name=tonkine-backend
server.port=8080
server.servlet.context-path=/api

# ── JPA / Hibernate (commun à toutes les bases) ──
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20

# ── Upload de fichiers (photos posture) ──
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=40MB

# ── Dossier de stockage des photos posture ──
# Modifiez ce chemin selon l'environnement serveur
tonkine.upload.photos-dir=./uploads/photos-posture

# ── JWT ──
# Lue depuis la variable d'environnement TONKINE_JWT_SECRET.
# Fallback sur une clé de développement UNIQUEMENT si la variable n'est pas définie.
# En production : définissez obligatoirement TONKINE_JWT_SECRET dans .env ou le système.
tonkine.jwt.secret=${TONKINE_JWT_SECRET:tonkine-dev-only-secret-NOT-for-production-change-me-now}
tonkine.jwt.expiration-ms=${TONKINE_JWT_EXPIRATION:86400000}

# ── CORS ──
# En production : TONKINE_CORS_ALLOWED_ORIGINS=https://app.votredomaine.cm
tonkine.cors.allowed-origins=${TONKINE_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
