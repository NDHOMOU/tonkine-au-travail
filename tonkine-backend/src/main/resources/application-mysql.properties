# ═══════════════════════════════════════════════════════════════
# TonKiné au Travail — Profil MySQL / MariaDB
# ═══════════════════════════════════════════════════════════════
# Décommenter le driver MySQL dans pom.xml avant d'utiliser ce profil.
# Commande de démarrage : java -jar tonkine.jar --spring.profiles.active=mysql
# ═══════════════════════════════════════════════════════════════

spring.datasource.url=jdbc:mysql://localhost:3306/tonkine_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=tonkine_user
spring.datasource.password=votre_mot_de_passe_ici
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway : scripts SQL dans le dossier db-mysql/ (hors de db/migration pour
# éviter que le profil postgres, qui scanne classpath:db/migration de façon
# récursive, ne les découvre aussi et ne détecte un conflit de version).
spring.flyway.locations=classpath:db-mysql
spring.flyway.baseline-on-migrate=true
