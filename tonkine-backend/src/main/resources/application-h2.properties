# ═══════════════════════════════════════════════════════════════
# TonKiné au Travail — Profil H2 (développement local)
# Base embarquée, aucune installation requise.
# Console H2 : http://localhost:8080/api/h2-console
# ═══════════════════════════════════════════════════════════════
# Note : H2 en mode MySQL pour réutiliser les scripts MySQL sans modification.
# ═══════════════════════════════════════════════════════════════

spring.datasource.url=jdbc:h2:file:./data/tonkine-dev;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Flyway : réutilise les scripts MySQL (compatibles avec H2 en mode MySQL)
spring.flyway.locations=classpath:db/migration/mysql
spring.flyway.baseline-on-migrate=true
