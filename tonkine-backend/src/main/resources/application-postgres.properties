# ═══════════════════════════════════════════════════════════════
# TonKiné au Travail — Profil PostgreSQL (recommandé en production)
# ═══════════════════════════════════════════════════════════════
# Démarrage : java -jar tonkine.jar --spring.profiles.active=postgres
# Avec Docker : voir docker-compose.yml à la racine
# ═══════════════════════════════════════════════════════════════

spring.datasource.url=jdbc:postgresql://localhost:5432/tonkine_db
spring.datasource.username=tonkine_user
spring.datasource.password=votre_mot_de_passe_ici
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway : scripts dans db/migration/ (racine = PostgreSQL natif)
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
